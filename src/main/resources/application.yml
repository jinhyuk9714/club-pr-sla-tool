spring:
  application:
    name: club-pr-sla-tool
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/club_sla}
    username: ${SPRING_DATASOURCE_USERNAME:club_sla}
    password: ${SPRING_DATASOURCE_PASSWORD:club_sla}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

management:
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

github:
  webhook:
    secret: ${GITHUB_WEBHOOK_SECRET:}

sla:
  policy:
    fallback-36h-enabled: ${SLA_FALLBACK_36H_ENABLED:false}
  scanner:
    interval-ms: ${SLA_SCANNER_INTERVAL_MS:300000}
    initial-delay-ms: ${SLA_SCANNER_INITIAL_DELAY_MS:300000}

outbound:
  jobs:
    interval-ms: ${OUTBOUND_JOBS_INTERVAL_MS:60000}

beta:
  access:
    allowed-logins: ${BETA_ALLOWED_GITHUB_LOGINS:}
    allowed-accounts: ${BETA_ALLOWED_GITHUB_ACCOUNTS:}

ops:
  security:
    admin-api-key: ${OPS_ADMIN_API_KEY:}
    rate-limit:
      max-requests: ${OPS_SECURITY_RATE_LIMIT_MAX_REQUESTS:60}
      window-seconds: ${OPS_SECURITY_RATE_LIMIT_WINDOW_SECONDS:60}
