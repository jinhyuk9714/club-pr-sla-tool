services:
  postgres:
    image: postgres:16-alpine
    container_name: club-sla-postgres
    environment:
      POSTGRES_DB: club_sla
      POSTGRES_USER: club_sla
      POSTGRES_PASSWORD: club_sla
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U club_sla -d club_sla"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: club-sla-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
