<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Club PR SLA Tool</title>
  </head>
  <body>
    <main>
      <h1>Club PR SLA Tool</h1>
      <p>GitHub App 설치 후 Discord 웹훅 한 번만 저장하면 PR 리뷰 SLA를 자동 추적합니다.</p>
      <p>
        <a th:href="${installUrl}">GitHub App 설치</a>
      </p>

      <section>
        <h2>설치 후 설정 계속하기</h2>
        <p>GitHub App 설치를 마쳤다면 installation ID로 설정 화면을 다시 엽니다.</p>
        <form th:action="@{/app/installations/setup}" method="get">
          <label for="installation_id">Installation ID</label>
          <input id="installation_id" name="installation_id" type="number" min="1" required />
          <button type="submit">설정 계속하기</button>
        </form>
      </section>
    </main>
  </body>
</html>
